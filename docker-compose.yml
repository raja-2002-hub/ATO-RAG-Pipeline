version: "3.8"

services:
  ato-rag:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      # Mount data dir so indexes persist outside the container
      - ./data:/app/data:ro
      - ./logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
